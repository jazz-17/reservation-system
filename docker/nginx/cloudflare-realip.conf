# This file is overwritten in production by a bind mount created/updated by
# `scripts/cloudflare/update.sh`.
#
# Keeping a placeholder in the image ensures Nginx always starts even if the
# production mount is missing.
#
# IMPORTANT: `CF-Connecting-IP` must only be trusted when the origin is locked
# down to Cloudflare IP ranges (host firewall and/or Nginx allowlist).
#
# NOTE: Cloudflare's "Pseudo IPv4" feature can overwrite `CF-Connecting-IP`.
# If you need the true visitor IP for IPv6 clients, configure Pseudo IPv4 to
# *not* overwrite headers (prefer "Off" or "Add header" instead of "Overwrite").

real_ip_header CF-Connecting-IP;
real_ip_recursive on;
